name: Build WhatsAuto APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Verify Flutter installation
        run: flutter --version

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_HOME }}/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build APK (debug)
        run: flutter build apk --debug --target-platform android-arm,android-arm64,android-x64 --split-per-abi

      - name: Build APK (release)
        run: flutter build apk --release --target-platform android-arm,android-arm64,android-x64 --split-per-abi

      - name: Build universal APK (release)
        run: flutter build apk --release

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/WhatsAuto-release-universal.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk artifacts/WhatsAuto-release-arm64.apk || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/WhatsAuto-release-arm32.apk || true
          cp build/app/outputs/flutter-apk/app-debug.apk artifacts/WhatsAuto-debug.apk || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAuto-APK-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
